name: Validate Migrations

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate migrations
        run: pnpm node scripts/migrations/validate-migrations.js
      - name: Run migration unit tests
        run: pnpm test -- scripts/migrations --run
